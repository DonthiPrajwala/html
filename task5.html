<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>feedback form</title>
</head>
<body>
    <h1>feedback form</h1>
    <form action="#" method="post">
    
    <label for="name"><strong>NAME:</strong></label>
    <input type="text" name="name" requried><br><br>

    <label for="email"><strong>EMAIL:</strong></label>
    <input type="email" name="email" requried><br><br>

     <label>Rating:</label><br>
    <input type="radio" id="rate1" name="rating" value="1" required>
    <label for="rate1">1</label>

    <input type="radio" id="rate2" name="rating" value="2">
    <label for="rate2">2</label>

    <input type="radio" id="rate3" name="rating" value="3">
    <label for="rate3">3</label>

    <input type="radio" id="rate4" name="rating" value="4">
    <label for="rate4">4</label>

    <input type="radio" id="rate5" name="rating" value="5">
    <label for="rate5">5</label><br><br>

    <label for="comments">Comments:</label><br>
    <textarea id="comments" name="comments" rows="5" cols="30" placeholder="Enter your comments here..."></textarea><br><br>

    <input type="submit" value="Submit Feedback">

    </form>
</body>
</html>
